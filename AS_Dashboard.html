<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Survival — 설문 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --c0:#020912;--c1:#04101f;--c2:#07182e;--c3:#0a1f3a;
  --ocean:#3ab8f5;--biolum:#00e8c8;--amber:#f6ca45;
  --coral:#f87272;--jade:#35d49c;--violet:#7c8fff;--rose:#ff7eb3;
  --bdr:rgba(58,184,245,0.09);--bdrm:rgba(58,184,245,0.18);--bdrh:rgba(58,184,245,0.35);
  --t1:#dff0ff;--t2:#6da8cb;--t3:#4d85a8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--c0);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 100% 55% at 50% -5%,rgba(58,184,245,.10) 0%,transparent 65%),radial-gradient(ellipse 60% 55% at 5% 100%,rgba(0,232,200,.08) 0%,transparent 55%),radial-gradient(ellipse 45% 40% at 95% 15%,rgba(124,143,255,.06) 0%,transparent 50%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(180deg,transparent 0px,transparent 96px,rgba(58,184,245,.010) 96px,rgba(58,184,245,.010) 97px);}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(2,9,18,.88);backdrop-filter:blur(24px) saturate(200%);border-bottom:1px solid var(--bdrm);z-index:100;display:flex;align-items:center;padding:0 40px;gap:16px;}
.nav-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,rgba(58,184,245,.15),rgba(0,232,200,.1)) padding-box,linear-gradient(135deg,var(--ocean),var(--biolum)) border-box;border:1px solid transparent;display:flex;align-items:center;justify-content:center;font-size:17px;filter:drop-shadow(0 0 8px rgba(58,184,245,.55));flex-shrink:0;}
.nav-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--ocean);letter-spacing:.07em;text-transform:uppercase;}
.nav-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.05em;margin-left:4px;}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.nav-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);text-decoration:none;padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);transition:color .2s,border-color .2s,background .2s;}
.nav-link:hover{color:var(--ocean);border-color:var(--bdrm);background:rgba(58,184,245,.06);}
.nav-badge{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(0,232,200,.07);border:1px solid rgba(0,232,200,.2);font-size:11px;color:var(--biolum);}
.nav-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--biolum);box-shadow:0 0 6px rgba(0,232,200,.7);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,232,200,.5);}50%{opacity:.6;box-shadow:0 0 0 4px rgba(0,232,200,0);}}

/* PAGE */
.page{position:relative;z-index:1;min-height:100vh;padding:100px 40px 80px;}
.inner{max-width:1100px;margin:0 auto;}

/* HERO */
.hero{text-align:center;margin-bottom:52px;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;background:rgba(58,184,245,.07);border:1px solid var(--bdrm);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px;}
.hero-title{font-family:'Outfit',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.05;letter-spacing:-.03em;background:linear-gradient(135deg,var(--t1) 30%,var(--ocean) 65%,var(--biolum) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;}
.hero-sub{font-size:14px;color:var(--t2);line-height:1.7;}
.h-rule{width:80px;height:1px;margin:24px auto 0;background:linear-gradient(90deg,transparent,var(--ocean),transparent);}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:40px;}
.stat-card{
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:1px solid var(--bdrm);border-radius:16px;
  padding:22px 24px;
  animation:fade-up .4s cubic-bezier(.22,.61,.36,1) both;
}
.stat-card:nth-child(1){animation-delay:.05s;}
.stat-card:nth-child(2){animation-delay:.1s;}
.stat-card:nth-child(3){animation-delay:.15s;}
.stat-card:nth-child(4){animation-delay:.2s;}
@keyframes fade-up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.stat-value{font-family:'Outfit',sans-serif;font-size:36px;font-weight:900;letter-spacing:-.03em;color:var(--t1);line-height:1;}
.stat-sub{font-size:12px;color:var(--t3);margin-top:6px;}
.stat-card.accent-ocean .stat-value{color:var(--ocean);}
.stat-card.accent-biolum .stat-value{color:var(--biolum);}
.stat-card.accent-amber .stat-value{color:var(--amber);}
.stat-card.accent-violet .stat-value{color:var(--violet);}

/* FILTER BAR */
.filter-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-bottom:32px;padding:16px 20px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:1px solid var(--bdrm);border-radius:14px;
}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);letter-spacing:.08em;flex-shrink:0;}
.filter-btn{
  padding:5px 14px;border-radius:20px;border:1px solid var(--bdr);
  background:transparent;color:var(--t3);
  font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.filter-btn:hover{background:rgba(58,184,245,.07);color:var(--t2);border-color:var(--bdrm);}
.filter-btn.active{background:rgba(58,184,245,.12);color:var(--ocean);border-color:rgba(58,184,245,.35);}

/* CHART SECTION */
.section-title{
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;
  color:var(--t2);letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--bdr);}

.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:40px;}

.chart-card{
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:1px solid var(--bdrm);border-radius:16px;
  padding:24px 24px 20px;
  animation:fade-up .4s cubic-bezier(.22,.61,.36,1) both;
}
.chart-card:nth-child(odd){animation-delay:.08s;}
.chart-card:nth-child(even){animation-delay:.14s;}

.chart-q-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ocean);opacity:.6;letter-spacing:.1em;margin-bottom:6px;}
.chart-q-text{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--t1);margin-bottom:20px;line-height:1.35;}

/* BARS */
.bar-list{display:flex;flex-direction:column;gap:10px;}
.bar-item{}
.bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.bar-label{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px;}
.bar-label .em{font-size:14px;}
.bar-stats{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);}
.bar-track{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.22,.61,.36,1);width:0%;}

/* pie-like donut for top stat */
.donut-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.donut-ring{position:relative;width:110px;height:110px;flex-shrink:0;}
.donut-ring svg{transform:rotate(-90deg);}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.donut-pct{font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;color:var(--t1);line-height:1;}
.donut-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.06em;}

/* EMPTY STATE */
.empty{
  text-align:center;padding:80px 20px;
  font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
.empty-title{font-size:14px;color:var(--t2);margin-bottom:8px;}
.empty a{color:var(--ocean);text-decoration:none;}
.empty a:hover{text-decoration:underline;}

/* RECENT TABLE */
.table-wrap{overflow-x:auto;margin-top:8px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.08em;text-align:left;padding:8px 12px;border-bottom:1px solid var(--bdr);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid rgba(58,184,245,.05);color:var(--t2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(58,184,245,.03);}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10px;}

/* DANGER ZONE */
.danger-zone{
  margin-top:48px;padding:20px 24px;border-radius:14px;
  background:rgba(248,114,114,.04);border:1px solid rgba(248,114,114,.15);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.danger-text{font-size:13px;color:rgba(248,114,114,.75);}
.btn-danger{
  padding:8px 20px;border-radius:8px;border:1px solid rgba(248,114,114,.3);
  background:rgba(248,114,114,.08);color:var(--coral);
  font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
.btn-danger:hover{background:rgba(248,114,114,.16);}

/* FOOTER */
.footer{text-align:center;margin-top:60px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);display:flex;flex-direction:column;gap:6px;align-items:center;}
.footer-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--bdrm),transparent);margin-bottom:8px;}

@media(max-width:600px){nav{padding:0 16px;}.page{padding:80px 16px 60px;}.charts-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<nav>
  <div class="nav-icon">🌊</div>
  <div>
    <div class="nav-title">Aqua Survival</div>
    <div class="nav-sub">DASHBOARD</div>
  </div>
  <div class="nav-right">
    <a class="nav-link" href="main.html">게임 선택</a>
    <a class="nav-link" href="AS_Survey.html">← 설문으로</a>
    <div class="nav-badge"><div class="nav-badge-dot"></div><span id="nav-total">0</span> RESPONSES</div>
  </div>
</nav>

<div class="page">
<div class="inner">

  <div class="hero">
    <div class="hero-eyebrow">📊 &nbsp;SURVEY DASHBOARD</div>
    <h1 class="hero-title">설문 결과<br>대시보드</h1>
    <p class="hero-sub">수집된 응답을 실시간으로 확인하세요.<br>페이지를 새로고침하면 최신 데이터가 반영됩니다.</p>
    <div class="h-rule"></div>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">📭</div>
    <div class="empty-title">아직 응답이 없습니다</div>
    <div style="margin-top:8px"><a href="AS_Survey.html">설문 참여하기 →</a></div>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div id="dash-content">

    <!-- STAT CARDS -->
    <div class="stat-grid" id="stat-grid"></div>

    <!-- FILTER -->
    <div class="filter-bar">
      <span class="filter-label">게임 필터</span>
      <button class="filter-btn active" data-game="all">전체</button>
      <button class="filter-btn" data-game="살려주세요">🆘 살려주세요</button>
      <button class="filter-btn" data-game="심해의 습격">🦑 심해의 습격</button>
      <button class="filter-btn" data-game="데스티니 구출">🚢 데스티니 구출</button>
      <button class="filter-btn" data-game="최후의 방주">⚓ 최후의 방주</button>
    </div>

    <!-- CHARTS -->
    <div class="section-title">응답 분포</div>
    <div class="charts-grid" id="charts-grid"></div>

    <!-- RECENT -->
    <div class="section-title">최근 응답</div>
    <div class="chart-card" style="padding:20px;">
      <div class="table-wrap"><table id="recent-table">
        <thead><tr>
          <th>#</th><th>날짜</th><th>게임</th><th>만족도</th><th>난이도</th><th>좋았던 요소</th><th>재플레이</th><th>추천</th>
        </tr></thead>
        <tbody id="recent-tbody"></tbody>
      </table></div>
    </div>

    <!-- DANGER ZONE -->
    <div class="danger-zone">
      <div class="danger-text">⚠️ 데이터 초기화 — 저장된 모든 응답이 삭제됩니다.</div>
      <button class="btn-danger" id="btn-clear">데이터 초기화</button>
    </div>

  </div><!-- /dash-content -->

  <div class="footer">
    <div class="footer-line"></div>
    <div>AQUA SURVIVAL · SURVEY DASHBOARD</div>
    <div style="opacity:.6">© 2026 — 데이터는 브라우저 로컬에 저장됩니다</div>
  </div>

</div>
</div>

<script>
const STORAGE_KEY = 'as_survey_v1';

const Q_META = [
  { key:'q1', label:'플레이한 게임', num:'Q·01' },
  { key:'q2', label:'전반적인 만족도', num:'Q·02' },
  { key:'q3', label:'게임 난이도', num:'Q·03' },
  { key:'q4', label:'가장 좋았던 요소', num:'Q·04' },
  { key:'q5', label:'재플레이 의향', num:'Q·05' },
  { key:'q6', label:'추천 의향', num:'Q·06' },
];

const COLORS = [
  'linear-gradient(90deg,var(--ocean),var(--biolum))',
  'linear-gradient(90deg,var(--biolum),var(--jade))',
  'linear-gradient(90deg,var(--amber),var(--coral))',
  'linear-gradient(90deg,var(--violet),var(--rose))',
  'linear-gradient(90deg,var(--ocean),var(--violet))',
  'linear-gradient(90deg,var(--jade),var(--amber))',
  'linear-gradient(90deg,var(--coral),var(--rose))',
];

const GAME_TAG_STYLE = {
  '살려주세요':  { bg:'rgba(58,184,245,.12)',  color:'var(--ocean)',  border:'rgba(58,184,245,.28)' },
  '심해의 습격': { bg:'rgba(0,232,200,.12)',   color:'var(--biolum)', border:'rgba(0,232,200,.28)' },
  '데스티니 구출':{ bg:'rgba(246,202,69,.12)',  color:'var(--amber)',  border:'rgba(246,202,69,.28)' },
  '최후의 방주': { bg:'rgba(124,143,255,.12)', color:'var(--violet)', border:'rgba(124,143,255,.28)' },
};

let currentFilter = 'all';
let allData = [];

function load() {
  allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  render();
}

function filtered() {
  if (currentFilter === 'all') return allData;
  return allData.filter(r => r.q1 === currentFilter);
}

function render() {
  const data = filtered();
  const total = allData.length;
  const fTotal = data.length;

  document.getElementById('nav-total').textContent = total;

  if (total === 0) {
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('dash-content').style.display = 'none';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dash-content').style.display = 'block';

  renderStats(data, total);
  renderCharts(data);
  renderRecent(allData);
}

function renderStats(data, total) {
  const fTotal = data.length;

  // satisfaction score
  const satMap = { '매우 만족':5,'만족':4,'보통':3,'불만족':2,'매우 불만족':1 };
  const satAvg = data.length ? (data.reduce((s,r) => s + (satMap[r.q2]||3), 0) / data.length).toFixed(1) : '-';

  // top game
  const gameCounts = {};
  allData.forEach(r => { gameCounts[r.q1] = (gameCounts[r.q1]||0)+1; });
  const topGame = Object.entries(gameCounts).sort((a,b)=>b[1]-a[1])[0];

  // recommend positive rate
  const posRec = data.filter(r => r.q6 === '적극 추천' || r.q6 === '추천').length;
  const recPct = fTotal ? Math.round(posRec / fTotal * 100) : 0;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card accent-ocean">
      <div class="stat-label">총 응답 수</div>
      <div class="stat-value">${total}</div>
      <div class="stat-sub">필터 적용 시 ${fTotal}개</div>
    </div>
    <div class="stat-card accent-biolum">
      <div class="stat-label">평균 만족도</div>
      <div class="stat-value">${satAvg}<span style="font-size:16px;opacity:.5"> /5</span></div>
      <div class="stat-sub">5점 만점 기준</div>
    </div>
    <div class="stat-card accent-amber">
      <div class="stat-label">추천 의향</div>
      <div class="stat-value">${recPct}<span style="font-size:16px;opacity:.5">%</span></div>
      <div class="stat-sub">긍정 응답 비율</div>
    </div>
    <div class="stat-card accent-violet">
      <div class="stat-label">인기 게임</div>
      <div class="stat-value" style="font-size:22px;line-height:1.2">${topGame ? topGame[0] : '-'}</div>
      <div class="stat-sub">${topGame ? topGame[1] + '명 플레이' : ''}</div>
    </div>
  `;
}

function countValues(data, key) {
  const counts = {};
  data.forEach(r => { const v = r[key]; if(v) counts[v] = (counts[v]||0)+1; });
  return counts;
}

function renderCharts(data) {
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = '';
  const total = data.length;
  if (!total) { grid.innerHTML = '<div style="color:var(--t3);font-size:13px;padding:20px">필터 결과가 없습니다.</div>'; return; }

  Q_META.forEach(q => {
    const counts = countValues(data, q.key);
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

    const card = document.createElement('div');
    card.className = 'chart-card';

    const bars = sorted.map((([label, cnt], i) => {
      const pct = Math.round(cnt / total * 100);
      const grad = COLORS[i % COLORS.length];
      return `
        <div class="bar-item">
          <div class="bar-meta">
            <span class="bar-label"><span class="opt-txt">${label}</span></span>
            <span class="bar-stats">${cnt}명 · ${pct}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="background:${grad}" data-pct="${pct}"></div>
          </div>
        </div>`;
    })).join('');

    card.innerHTML = `
      <div class="chart-q-num">${q.num}</div>
      <div class="chart-q-text">${q.label}</div>
      <div class="bar-list">${bars}</div>
    `;
    grid.appendChild(card);
  });

  // animate bars after render
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });
  });
}

function renderRecent(data) {
  const tbody = document.getElementById('recent-tbody');
  const rows = [...data].reverse().slice(0, 20);

  const satEmoji = { '매우 만족':'😍','만족':'😊','보통':'😐','불만족':'😕','매우 불만족':'😞' };
  const recEmoji = { '적극 추천':'🌟','추천':'👌','보통':'😐','비추천':'👎' };

  tbody.innerHTML = rows.map((r, i) => {
    const gs = GAME_TAG_STYLE[r.q1] || {};
    const tag = `<span class="tag" style="background:${gs.bg};color:${gs.color};border:1px solid ${gs.border}">${r.q1||'-'}</span>`;
    return `<tr>
      <td style="font-family:'JetBrains Mono',monospace;opacity:.5">${data.length - i}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${r.date||'-'}</td>
      <td>${tag}</td>
      <td>${satEmoji[r.q2]||''} ${r.q2||'-'}</td>
      <td>${r.q3||'-'}</td>
      <td>${r.q4||'-'}</td>
      <td>${r.q5||'-'}</td>
      <td>${recEmoji[r.q6]||''} ${r.q6||'-'}</td>
    </tr>`;
  }).join('');
}

/* filter buttons */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.game;
    render();
  });
});

/* clear */
document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('모든 응답 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
    localStorage.removeItem(STORAGE_KEY);
    load();
  }
});

/* particles */
(function(){
  const c = document.getElementById('particles'), x = c.getContext('2d');
  let W, H, pts = [];
  const cols = ['rgba(58,184,245,','rgba(0,232,200,','rgba(124,143,255,'];
  function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
  function init(){ pts = []; for(let i=0;i<40;i++) pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,a:Math.random()*.4+.1,c:cols[Math.floor(Math.random()*3)],f:Math.random()*Math.PI*2,fs:Math.random()*.018+.004}); }
  function draw(){ x.clearRect(0,0,W,H); pts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.f+=p.fs; if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0; const a=p.a+Math.sin(p.f)*.1; x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=p.c+a.toFixed(2)+')';x.fill(); }); requestAnimationFrame(draw); }
  window.addEventListener('resize',()=>{resize();init();});
  resize();init();draw();
})();

load();
</script>
</body>
</html>
